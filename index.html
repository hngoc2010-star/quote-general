<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plywood Profit</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Plywood Profit Calculator</h2>

<label>Thickness (mm)</label>
<input id="thickness" type="number" step="0.5">

<label>Size</label>
<select id="size">
<option value="1220x2440">1220 × 2440</option>
<option value="915x1830">915 × 1830</option>
<option value="custom">Custom</option>
</select>

<div id="customSize">

<label>Width (mm)</label>
<input id="width" type="text">

<label>Length (mm)</label>
<input id="length" type="text">

</div>

<label>Bundles</label>
<input id="bundles" type="text">

<label>PCS / Bundle</label>
<input id="pcsBundle" type="text">

<label>EXW VND / PC</label>
<input id="exwPc" type="text">

<label>EXW VND / CBM</label>
<input id="exwCbm" type="text">

<label>CFR USD / CBM</label>
<input id="cfrUsd" type="text">

<label>USD Rate</label>
<input id="usdRate" type="text">

<label>Logistics (total)</label>
<input id="logistics" type="text">

<label>Thickness Rule</label>
<select id="rule">
<option value="0.5">+0.5</option>
<option value="0.7">+0.7</option>
<option value="1">+1</option>
</select>

<div class="result">

<div>Total PCS <span id="totalPcs">0</span></div>
<div>CBM Buy <span id="cbmBuy">0</span></div>
<div>CBM Sell <span id="cbmSell">0</span></div>
<div>CBM Diff <span id="cbmDiff">0</span></div>
<div>EXW Cost <span id="exwCost">0</span></div>
<div>Revenue <span id="revenue">0</span></div>
<div>Profit / CBM <span id="profitCbm">0</span></div>
<div class="profitRow">Total Profit <span id="totalProfit">0</span></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
