<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=430, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Plywood Profit</title>

<style>

body{
font-family:-apple-system;
background:#f4f6f8;
margin:0;
padding:6px;
}

.container{
width:410px;
margin:auto;
}

h2{
text-align:center;
margin:4px 0 8px 0;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:4px 6px;
}

label{
font-size:12px;
}

input,select{
height:30px;
font-size:15px;
padding:2px 4px;
border-radius:5px;
border:1px solid #ccc;
}

.results{
margin-top:8px;
background:white;
padding:8px;
border-radius:8px;
font-size:16px;
box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.results div{
display:flex;
justify-content:space-between;
padding:2px 0;
}

.red{
color:red;
font-weight:600;
}

.blue{
color:#0066ff;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<h2>Plywood Profit</h2>

<div class="grid">

<label>Thickness (mm)</label>
<input id="thicknessBuy" type="number" step="0.5">

<label>Size</label>
<select id="size">
<option value="1220x2440">1220 × 2440</option>
<option value="915x1830">915 × 1830</option>
<option value="custom">Custom</option>
</select>

<label>Width (mm)</label>
<input id="width">

<label>Length (mm)</label>
<input id="length">

<label>Bundles</label>
<input id="bundles">

<label>PCS / Bundle</label>
<input id="pcsBundle">

<label>EXW VND / PC</label>
<input id="pricePc">

<label>EXW VND / CBM</label>
<input id="priceCbm">

<label>USD Rate</label>
<input id="usdRate">

<label>Logistics VND</label>
<input id="logistics">

<label>CFR USD / CBM</label>
<input id="cfrPrice">

<label>Thickness Rule</label>
<select id="rule">
<option value="0.5">+0.5</option>
<option value="0">0</option>
<option value="-0.5">-0.5</option>
</select>

</div>

<div class="results">

<div>Total PCS <span id="totalPcs">0</span></div>
<div>CBM Buy <span id="cbmBuy">0</span></div>
<div>CBM Sell <span id="cbmSell">0</span></div>
<div>CBM Diff <span id="cbmDiff">0</span></div>
<div>Profit / CBM <span id="profitCbm">0</span></div>
<div>Total Profit <span id="profitTotal">0</span></div>

</div>

</div>

<script>

const inputs=document.querySelectorAll("input,select")

inputs.forEach(el=>{
el.addEventListener("input",handleInput)
})

function parse(v){
return Number(v.replace(/,/g,""))||0
}

function format(v){
return v.toLocaleString("en-US",{maximumFractionDigits:2})
}

function formatInput(el){

let cursor=el.selectionStart
let value=el.value.replace(/,/g,"")

if(value==="") return

let num=Number(value)

if(isNaN(num)) return

let formatted=num.toLocaleString("en-US")

el.value=formatted

let newPos=formatted.length
el.setSelectionRange(newPos,newPos)

}

function handleInput(e){

let el=e.target

if(el.type!=="number"){
formatInput(el)
}

updateSize()

calculate()

}

function updateSize(){

let size=document.getElementById("size").value

if(size==="1220x2440"){
width.value=1220
length.value=2440
}

if(size==="915x1830"){
width.value=915
length.value=1830
}

}

function calculate(){

let thickness=parse(thicknessBuy.value)

let widthM=parse(width.value)/1000
let lengthM=parse(length.value)/1000

let bundles=parse(bundles.value)
let pcsBundle=parse(pcsBundle.value)

let pricePc=parse(pricePc.value)
let priceCbm=parse(priceCbm.value)

let usd=parse(usdRate.value)
let logisticsCost=parse(logistics.value)
let cfr=parse(cfrPrice.value)

let rule=parse(document.getElementById("rule").value)

let thicknessSell=thickness+rule

let totalPcs=bundles*pcsBundle

let cbmBuy=widthM*lengthM*(thickness/1000)*totalPcs
let cbmSell=widthM*lengthM*(thicknessSell/1000)*totalPcs

let cbmDiff=cbmSell-cbmBuy

let exw=0

if(pricePc>0){
exw=pricePc*totalPcs
}else{
exw=priceCbm*cbmBuy
}

let revenue=cfr*usd*cbmSell

let totalCost=exw+logisticsCost

let profit=revenue-totalCost

let profitCbm=cbmSell?profit/cbmSell:0

totalPcsEl.innerText=format(totalPcs)
cbmBuyEl.innerText=format(cbmBuy)
cbmSellEl.innerText=format(cbmSell)
cbmDiffEl.innerText=format(cbmDiff)

profitTotal.innerText=format(profit)
profitCbmEl.innerText=format(profitCbm)

if(profit<0){
profitTotal.className="red"
profitCbmEl.className="red"
}else{
profitTotal.className="blue"
profitCbmEl.className="blue"
}

}

const totalPcsEl=document.getElementById("totalPcs")
const cbmBuyEl=document.getElementById("cbmBuy")
const cbmSellEl=document.getElementById("cbmSell")
const cbmDiffEl=document.getElementById("cbmDiff")
const profitCbmEl=document.getElementById("profitCbm")
const profitTotal=document.getElementById("profitTotal")

</script>

</body>
</html>
