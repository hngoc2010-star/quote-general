<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=430, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Plywood Profit Calculator</title>

<style>

body{
font-family:-apple-system;
background:#f4f6f8;
margin:0;
padding:6px;
}

.container{
width:410px;
margin:auto;
}

h2{
text-align:center;
margin:4px 0 8px 0;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:4px 6px;
}

label{
font-size:12px;
margin-top:2px;
}

input,select{
height:30px;
font-size:15px;
padding:2px 4px;
border-radius:5px;
border:1px solid #ccc;
}

.results{
margin-top:8px;
background:white;
padding:8px;
border-radius:8px;
font-size:16px;
box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.results div{
display:flex;
justify-content:space-between;
padding:2px 0;
}

.red{
color:red;
font-weight:600;
}

.blue{
color:#0066ff;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<h2>Plywood Profit</h2>

<div class="grid">

<label>Thickness Buy (mm)</label>
<input id="thicknessBuy">

<label>Size</label>
<select id="size">
<option value="1220x2440">1220 × 2440</option>
<option value="915x2405">915 × 2405</option>
</select>

<label>Bundles</label>
<input id="bundles">

<label>PCS / Bundle</label>
<input id="pcsBundle">

<label>EXW VND / PC</label>
<input id="pricePc">

<label>EXW VND / CBM</label>
<input id="priceCbm">

<label>USD Rate</label>
<input id="usdRate">

<label>Logistics VND</label>
<input id="logistics">

<label>CFR USD / CBM</label>
<input id="cfrPrice">

<label>Thickness Rule</label>
<select id="rule">
<option value="0.5">+0.5 mm</option>
<option value="0">0 mm</option>
<option value="-0.5">-0.5 mm</option>
</select>

</div>

<div class="results">

<div>Total PCS <span id="totalPcs">0</span></div>
<div>CBM Buy <span id="cbmBuy">0</span></div>
<div>CBM Sell <span id="cbmSell">0</span></div>
<div>CBM Diff <span id="cbmDiff">0</span></div>
<div>Profit / CBM <span id="profitCbm">0</span></div>
<div>Total Profit <span id="profitTotal">0</span></div>

</div>

</div>


<script>

const inputs=document.querySelectorAll("input,select")

inputs.forEach(el=>{
el.addEventListener("input",handleInput)
})

function parse(v){
return Number(v.replace(/,/g,""))||0
}

function format(v){
return v.toLocaleString("en-US",{maximumFractionDigits:2})
}

function handleInput(e){

let el=e.target

if(el.tagName==="INPUT"){

let num=parse(el.value)

if(num){
el.value=format(num)
}

}

calculate()

}

function calculate(){

let thicknessBuy=parse(thicknessBuy.value)
let bundles=parse(bundles.value)
let pcsBundle=parse(pcsBundle.value)

let pricePc=parse(pricePc.value)
let priceCbm=parse(priceCbm.value)

let usdRate=parse(usdRate.value)
let logistics=parse(logistics.value)
let cfr=parse(cfrPrice.value)

let rule=parse(document.getElementById("rule").value)

let size=document.getElementById("size").value

let width=0
let length=0

if(size=="1220x2440"){
width=1.22
length=2.44
}else{
width=0.915
length=2.405
}

let thicknessSell=thicknessBuy+rule

let totalPcs=bundles*pcsBundle

let cbmBuy=width*length*(thicknessBuy/1000)*totalPcs

let cbmSell=width*length*(thicknessSell/1000)*totalPcs

let cbmDiff=cbmSell-cbmBuy

let exw=0

if(pricePc>0){
exw=pricePc*totalPcs
}else{
exw=priceCbm*cbmBuy
}

let revenue=cfr*usdRate*cbmSell

let totalCost=exw+logistics

let profit=revenue-totalCost

let profitCbm=cbmSell?profit/cbmSell:0

totalPcs.innerText=format(totalPcs)
cbmBuy.innerText=format(cbmBuy)
cbmSell.innerText=format(cbmSell)
cbmDiff.innerText=format(cbmDiff)

profitTotal.innerText=format(profit)
profitCbm.innerText=format(profitCbm)

if(profit<0){
profitTotal.className="red"
profitCbm.className="red"
}else{
profitTotal.className="blue"
profitCbm.className="blue"
}

}

</script>

</body>
</html>
